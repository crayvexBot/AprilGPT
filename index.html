<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>April GPT</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">April GPT v2</div>

    <button class="new-chat" onclick="newChat()">+ New Chat</button>

    <div id="chatList" class="chat-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input id="input" placeholder="Message April GPT..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats") || "{}");
let currentChat = localStorage.getItem("currentChat") || null;

const chatEl = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("input");

/* ------------------------
   INIT
------------------------ */
function init() {
  if (!currentChat) {
    newChat();
  }
  renderSidebar();
  loadChat(currentChat);
}

/* ------------------------
   NEW CHAT
------------------------ */
function newChat() {
  const id = "chat_" + Date.now();
  chats[id] = [];
  currentChat = id;

  save();
  renderSidebar();
  loadChat(id);
}

/* ------------------------
   SWITCH CHAT
------------------------ */
function switchChat(id) {
  currentChat = id;
  save();
  loadChat(id);
}

/* ------------------------
   SAVE
------------------------ */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChat", currentChat);
}

/* ------------------------
   RENDER SIDEBAR
------------------------ */
function renderSidebar() {
  chatList.innerHTML = "";

  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.innerText = id;

    if (id === currentChat) div.classList.add("active");

    div.onclick = () => switchChat(id);

    chatList.appendChild(div);
  });
}

/* ------------------------
   LOAD CHAT
------------------------ */
function loadChat(id) {
  chatEl.innerHTML = "";

  (chats[id] || []).forEach(m => {
    addMessageUI(m.role, m.text);
  });

  chatEl.scrollTop = chatEl.scrollHeight;
}

/* ------------------------
   UI MESSAGE
------------------------ */
function addMessageUI(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  chatEl.appendChild(div);
}

/* ------------------------
   SEND MESSAGE
------------------------ */
async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  chats[currentChat].push({ role: "user", text: msg });
  addMessageUI("user", msg);

  const thinking = document.createElement("div");
  thinking.className = "msg ai";
  thinking.innerText = "thinking...";
  chatEl.appendChild(thinking);

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: msg,
      history: chats[currentChat]
    })
  });

  const data = await res.json();

  thinking.remove();

  chats[currentChat].push({ role: "ai", text: data.reply });
  addMessageUI("ai", data.reply);

  save();
  chatEl.scrollTop = chatEl.scrollHeight;
}

init();
</script>

</body>
</html>
