<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April GPT</title>

<style>
:root {
  --bg: #0f0f0f;
  --panel: #1a1a1a;
  --text: #ffffff;
  --accent: #2563eb;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
}

/* LOGIN */
.login {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  background: var(--panel);
  padding: 30px;
  border-radius: 14px;
  width: 320px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: var(--accent);
  color: white;
  cursor: pointer;
}

/* CHAT */
.app {
  display: none;
  height: 100vh;
}

.sidebar {
  width: 250px;
  background: #111;
  padding: 10px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
}

.user { background: #2563eb; }
.ai { background: #333; }

.input-area {
  display: flex;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginUI" class="login">
  <div class="box">
    <h2 id="title">Sign Up</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <div id="rules">
      * 8+ chars, capital, special char
    </div>

    <button onclick="submit()">Sign Up</button>

    <div onclick="toggle()" style="cursor:pointer; font-size:13px;">
      Switch Login/Signup
    </div>

    <div id="error" style="color:red;"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chatUI" class="app">
  <div class="sidebar">
    <button onclick="newChat()">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <div class="main">
    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input id="input">
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
let username = localStorage.getItem("username");

/* ================= LOGIN ================= */
let isLogin = false;

function toggle() {
  isLogin = !isLogin;
}

async function submit() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const route = isLogin ? "/login" : "/signup";

  const res = await fetch(route, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username: user, password: pass })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("error").innerText = data.error;
    return;
  }

  localStorage.setItem("username", user);
  startChat();
}

/* ================= CHAT ================= */
let chats = {};
let currentChat = null;

const chatEl = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("input");

function startChat() {
  document.getElementById("loginUI").style.display = "none";
  document.getElementById("chatUI").style.display = "flex";
  init();
}

async function init() {
  await loadChats();
  if (!currentChat) await newChat();
  else loadChat(currentChat);
}

async function loadChats() {
  const res = await fetch("/get-chats", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username })
  });

  const data = await res.json();
  chats = data.chats || {};
  currentChat = Object.keys(chats)[0] || null;

  renderSidebar();
}

async function newChat() {
  const res = await fetch("/create-chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username })
  });

  const data = await res.json();
  currentChat = data.chatId;

  await loadChats();
  loadChat(currentChat);
}

function renderSidebar() {
  chatList.innerHTML = "";
  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");
    div.innerText = chats[id].title || "Chat";
    div.onclick = () => {
      currentChat = id;
      loadChat(id);
    };
    chatList.appendChild(div);
  });
}

function loadChat(id) {
  chatEl.innerHTML = "";
  (chats[id]?.messages || []).forEach(m => {
    addMessageUI(m.role === "assistant" ? "ai" : "user", m.content);
  });
}

function addMessageUI(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  chatEl.appendChild(div);
}

/* FAKE STREAM */
function stream(el, text) {
  let i = 0;
  const int = setInterval(() => {
    el.innerText += text[i++];
    if (i >= text.length) clearInterval(int);
  }, 10);
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";
  addMessageUI("user", msg);

  const aiDiv = document.createElement("div");
  aiDiv.className = "msg ai";
  chatEl.appendChild(aiDiv);

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username,
      chatId: currentChat,
      message: msg
    })
  });

  const data = await res.json();
  stream(aiDiv, data.reply || "");
}

/* AUTO START */
if (username) {
  startChat();
}
</script>

</body>
</html>
