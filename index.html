<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>April GPT CMD</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="terminal">

    <div id="chat" class="chat"></div>

    <div class="input-bar">
      <span class="prompt">cmd>User:</span>
      <input id="input" placeholder="Message..." autocomplete="off" />
      <button onclick="send()">ENTER</button>
    </div>

  </div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addLine(prefix, text) {
  const div = document.createElement("div");
  div.className = "line";
  div.innerText = `cmd>${prefix}: ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  addLine("User", msg);
  input.value = "";

  addLine("HackerAI", "thinking...");

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  // remove "thinking..."
  chat.lastChild.remove();

  addLine("HackerAI", data.reply);
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
