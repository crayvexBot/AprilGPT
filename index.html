<!DOCTYPE html>
<html>
<head>
  <title>April GPT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar" class="open">

    <button id="newChatBtn" onclick="newChat()">+ New Chat</button>

    <div id="chatList"></div>

  </div>

  <!-- MAIN AREA -->
  <div id="main">

    <!-- TOP BAR -->
    <div id="topbar">
      <button id="toggleBtn" onclick="toggleSidebar()">☰</button>
      <div>April GPT • Cyber Chat</div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat"></div>

    <!-- INPUT -->
    <div id="inputBar">
      <input id="msg" placeholder="Message April GPT..."
        onkeydown="if(event.key==='Enter') send()">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
