<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<title>April GPT</title><style>
:root {
  --bg: #ffffff;
  --panel: #f7f7f8;
  --text: #000;
  --ai: #f1f1f1;
  --user: #dbeafe;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --panel: #1a1a1a;
    --text: #ffffff;
    --ai: #2a2a2a;
    --user: #2563eb33;
  }
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
}

.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--panel);
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.brand {
  font-size: 18px;
  margin-bottom: 10px;
}

.new-chat {
  padding: 12px;
  border: none;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
}

.chat-item {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
}

.chat-item:hover {
  background: rgba(0,0,0,0.1);
}

.chat-item.active {
  background: rgba(0,0,0,0.2);
}

.chat-actions {
  position: absolute;
  right: 5px;
  top: 5px;
  display: none;
}

.chat-item:hover .chat-actions {
  display: flex;
  gap: 5px;
}

.chat-actions button {
  border: none;
  cursor: pointer;
  font-size: 12px;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 25px;
}

/* MESSAGES */
.msg {
  max-width: 75%;
  padding: 16px 18px;
  margin: 14px 0;
  border-radius: 18px;
  font-size: 16px;
  line-height: 1.6;
  animation: fadeIn 0.2s ease;
}

.msg.user {
  margin-left: auto;
  background: var(--user);
}

.msg.ai {
  margin-right: auto;
  background: var(--ai);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* INPUT (20% HEIGHT) */
.input-area {
  height: 20%;
  display: flex;
  padding: 20px;
  gap: 10px;
  background: var(--panel);
}

.input-area input {
  flex: 1;
  padding: 18px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  background: #00000010;
  color: var(--text);
}

.input-area button {
  padding: 18px 25px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 16px;
}
</style></head><body><div class="app">  <!-- SIDEBAR -->  <div class="sidebar">
    <div class="brand">April GPT v3</div><button class="new-chat" onclick="newChat()">+ New Chat</button>

<div id="chatList"></div>

  </div>  <!-- MAIN -->  <div class="main"><div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Message April GPT..." />
  <button onclick="send()">Send</button>
</div>

  </div></div><script>
let chats = JSON.parse(localStorage.getItem("chats") || "{}");
let currentChat = localStorage.getItem("currentChat") || null;

const chatEl = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("input");

/* INIT */
function init() {
  if (!currentChat) newChat();
  renderSidebar();
  loadChat(currentChat);
}

/* NEW CHAT */
function newChat() {
  const id = "chat_" + Date.now();

  chats[id] = {
    title: "New Chat",
    messages: []
  };

  currentChat = id;

  save();
  renderSidebar();
  loadChat(id);
}

/* SWITCH */
function switchChat(id) {
  currentChat = id;
  save();
  loadChat(id);
}

/* DELETE */
function deleteChat(id) {
  if (!confirm("Delete this chat?")) return;

  delete chats[id];

  if (currentChat === id) {
    const keys = Object.keys(chats);
    currentChat = keys[0] || null;
  }

  save();
  renderSidebar();

  if (currentChat) loadChat(currentChat);
  else newChat();
}

/* RENAME */
function renameChat(id) {
  const name = prompt("Rename chat:", chats[id].title);
  if (!name) return;

  chats[id].title = name;
  save();
  renderSidebar();
}

/* SAVE */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChat", currentChat);
}

/* SIDEBAR */
function renderSidebar() {
  chatList.innerHTML = "";

  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");
    div.className = "chat-item";

    if (id === currentChat) div.classList.add("active");

    div.innerText = chats[id].title;

    div.onclick = () => switchChat(id);

    const actions = document.createElement("div");
    actions.className = "chat-actions";

    const del = document.createElement("button");
    del.innerText = "🗑";
    del.onclick = (e) => {
      e.stopPropagation();
      deleteChat(id);
    };

    const ren = document.createElement("button");
    ren.innerText = "✏️";
    ren.onclick = (e) => {
      e.stopPropagation();
      renameChat(id);
    };

    actions.appendChild(ren);
    actions.appendChild(del);
    div.appendChild(actions);

    chatList.appendChild(div);
  });
}

/* LOAD CHAT */
function loadChat(id) {
  chatEl.innerHTML = "";

  (chats[id]?.messages || []).forEach(m => {
    addMessageUI(m.role, m.text);
  });

  chatEl.scrollTop = chatEl.scrollHeight;
}

/* UI MESSAGE */
function addMessageUI(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  chatEl.appendChild(div);
}

/* STREAM */
function stream(el, text) {
  el.innerText = "";
  let i = 0;

  const int = setInterval(() => {
    el.innerText += text[i] || "";
    i++;

    chatEl.scrollTop = chatEl.scrollHeight;

    if (i >= text.length) clearInterval(int);
  }, 12);
}

/* SEND */
async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  chats[currentChat].messages.push({ role: "user", text: msg });
  addMessageUI("user", msg);

  const aiDiv = document.createElement("div");
  aiDiv.className = "msg ai";
  chatEl.appendChild(aiDiv);

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  stream(aiDiv, data.reply);

  chats[currentChat].messages.push({ role: "ai", text: data.reply });

  if (chats[currentChat].title === "New Chat") {
    chats[currentChat].title = msg.slice(0, 30);
    renderSidebar();
  }

  save();
}

/* ENTER KEY */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

init();
</script></body>
</html>
