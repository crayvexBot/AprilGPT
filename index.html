<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<title>April GPT</title>
<link rel="stylesheet" href="style.css" />
</head><body><div class="app">  <!-- SIDEBAR -->  <div class="sidebar">
    <div class="brand">April GPT v2</div><button class="new-chat" onclick="newChat()">+ New Chat</button>

<div id="chatList" class="chat-list"></div>

  </div>  <!-- MAIN -->  <div class="main"><div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Message April GPT..." />
  <button onclick="send()">Send</button>
</div>

  </div></div><script>
let chats = JSON.parse(localStorage.getItem("chats") || "{}");
let currentChat = localStorage.getItem("currentChat") || null;

const chatEl = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("input");

/* ------------------------
   INIT
------------------------ */
function init() {
  if (!currentChat) {
    newChat();
  }
  renderSidebar();
  loadChat(currentChat);
}

/* ------------------------
   NEW CHAT
------------------------ */
function newChat() {
  const id = "chat_" + Date.now();

  chats[id] = {
    title: "New Chat",
    messages: []
  };

  currentChat = id;

  save();
  renderSidebar();
  loadChat(id);
}

/* ------------------------
   SWITCH CHAT
------------------------ */
function switchChat(id) {
  currentChat = id;
  save();
  loadChat(id);
}

/* ------------------------
   SAVE
------------------------ */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChat", currentChat);
}

/* ------------------------
   RENDER SIDEBAR
------------------------ */
function renderSidebar() {
  chatList.innerHTML = "";

  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");
    div.className = "chat-item";

    div.innerText = chats[id].title || id;

    if (id === currentChat) div.classList.add("active");

    div.onclick = () => switchChat(id);

    chatList.appendChild(div);
  });
}

/* ------------------------
   LOAD CHAT
------------------------ */
function loadChat(id) {
  chatEl.innerHTML = "";

  (chats[id]?.messages || []).forEach(m => {
    addMessageUI(m.role, m.text);
  });

  chatEl.scrollTop = chatEl.scrollHeight;
}

/* ------------------------
   UI MESSAGE
------------------------ */
function addMessageUI(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  chatEl.appendChild(div);
}

/* ------------------------
   STREAM EFFECT
------------------------ */
function stream(el, text) {
  let i = 0;
  const int = setInterval(() => {
    el.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(int);
  }, 15);
}

/* ------------------------
   SEND MESSAGE
------------------------ */
async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  if (!chats[currentChat]) newChat();

  chats[currentChat].messages.push({ role: "user", text: msg });
  addMessageUI("user", msg);

  const aiDiv = document.createElement("div");
  aiDiv.className = "msg ai";
  chatEl.appendChild(aiDiv);

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: msg,
      history: chats[currentChat].messages
    })
  });

  const data = await res.json();

  stream(aiDiv, data.reply);

  chats[currentChat].messages.push({ role: "ai", text: data.reply });

  if (chats[currentChat].title === "New Chat") {
    chats[currentChat].title = msg.split(" ").slice(0, 5).join(" ");
    renderSidebar();
  }

  save();
  chatEl.scrollTop = chatEl.scrollHeight;
}

init();
</script></body>
</html>
