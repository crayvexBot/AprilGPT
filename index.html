<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>April GPT Login</title><style>
:root {
  --bg: #0f0f0f;
  --panel: #1a1a1a;
  --text: #ffffff;
  --accent: #2563eb;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.box {
  background: var(--panel);
  padding: 30px;
  border-radius: 14px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
  margin-top: 0;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #00000040;
  color: white;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.rules {
  font-size: 12px;
  color: #aaa;
  margin-top: 5px;
}

.switch {
  margin-top: 12px;
  font-size: 13px;
  text-align: center;
  color: #aaa;
  cursor: pointer;
}

.error {
  color: red;
  font-size: 13px;
  margin-top: 5px;
  text-align: center;
}
</style></head><body><div class="box">
  <h2 id="title">Sign Up</h2>  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">  <div id="rules" class="rules">
    * Must be 8+ characters<br>
    * Must contain a capital letter<br>
    * Must contain a special character
  </div><button onclick="submit()">Sign Up</button>

  <div id="switch" class="switch" onclick="toggle()">
    Already have an account? Login
  </div>  <div id="error" class="error"></div>
</div><script>
let isLogin = false;

function toggle() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
  document.querySelector("button").innerText = isLogin ? "Login" : "Sign Up";

  document.getElementById("rules").style.display = isLogin ? "none" : "block";

  document.getElementById("switch").innerText = isLogin
    ? "Don't have an account? Sign Up"
    : "Already have an account? Login";

  document.getElementById("error").innerText = "";
}

async function submit() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  const route = isLogin ? "/login" : "/signup";

  const res = await fetch(route, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("error").innerText = data.error;
    return;
  }

  // save session
  localStorage.setItem("username", username);

  // go to chat UI
  window.location.href = "chat.html";
}
</script></body>
</html>
