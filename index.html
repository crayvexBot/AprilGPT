<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<title>April GPT</title>
<link rel="stylesheet" href="style.css" />
</head><body><div class="app">  <!-- SIDEBAR (Discord style) -->  <div class="sidebar">
    <div class="brand">AprilGPT</div><button class="new-chat" onclick="newChat()">+ New Chat</button>

<div id="chatList" class="chat-list"></div>

  </div>  <!-- MAIN (ChatGPT style) -->  <div class="main"><div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Message April GPT..." />
  <button onclick="send()">Send</button>
</div>

  </div></div><script>
let chats = JSON.parse(localStorage.getItem("chats") || "{}");
let currentChat = localStorage.getItem("currentChat") || null;

const chatEl = document.getElementById("chat");
const chatList = document.getElementById("chatList");
const input = document.getElementById("input");

/* FIX OLD DATA */
Object.keys(chats).forEach(id => {
  if (Array.isArray(chats[id])) {
    chats[id] = { title: "New Chat", messages: chats[id] };
  }
});

/* INIT */
function init() {
  if (!currentChat) newChat();
  renderSidebar();
  loadChat(currentChat);
}

/* NEW CHAT */
function newChat() {
  const id = "chat_" + Date.now();

  chats[id] = {
    title: "New Chat",
    messages: []
  };

  currentChat = id;

  save();
  renderSidebar();
  loadChat(id);
}

/* SWITCH */
function switchChat(id) {
  currentChat = id;
  save();
  loadChat(id);
}

/* DELETE */
function deleteChat(id) {
  if (!confirm("Delete chat?")) return;

  delete chats[id];

  const keys = Object.keys(chats);
  currentChat = keys[0] || null;

  save();
  renderSidebar();

  if (currentChat) loadChat(currentChat);
  else newChat();
}

/* RENAME */
function renameChat(id) {
  const name = prompt("Rename:", chats[id].title);
  if (!name) return;

  chats[id].title = name;
  save();
  renderSidebar();
}

/* SAVE */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("currentChat", currentChat);
}

/* SIDEBAR */
function renderSidebar() {
  chatList.innerHTML = "";

  Object.keys(chats).forEach(id => {
    const item = document.createElement("div");
    item.className = "chat-item";
    if (id === currentChat) item.classList.add("active");

    const title = chats[id].title || "New Chat";
    item.innerText = "# " + title;

    item.onclick = () => switchChat(id);

    const actions = document.createElement("div");
    actions.className = "chat-actions";

    const rename = document.createElement("button");
    rename.innerText = "✏️";
    rename.onclick = (e) => {
      e.stopPropagation();
      renameChat(id);
    };

    const del = document.createElement("button");
    del.innerText = "🗑";
    del.onclick = (e) => {
      e.stopPropagation();
      deleteChat(id);
    };

    actions.appendChild(rename);
    actions.appendChild(del);
    item.appendChild(actions);

    chatList.appendChild(item);
  });
}

/* LOAD */
function loadChat(id) {
  chatEl.innerHTML = "";

  (chats[id]?.messages || []).forEach(m => {
    addMessageUI(m.role, m.text);
  });

  chatEl.scrollTop = chatEl.scrollHeight;
}

/* MESSAGE UI */
function addMessageUI(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  chatEl.appendChild(div);
}

/* STREAM FIXED */
function stream(el, text) {
  el.innerText = "";
  let i = 0;

  const int = setInterval(() => {
    el.innerText += text.charAt(i);
    i++;

    chatEl.scrollTop = chatEl.scrollHeight;

    if (i >= text.length) clearInterval(int);
  }, 12);
}

/* SEND */
async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  chats[currentChat].messages.push({ role: "user", text: msg });
  addMessageUI("user", msg);

  const aiDiv = document.createElement("div");
  aiDiv.className = "msg ai";
  chatEl.appendChild(aiDiv);

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  // FIX spacing issue
  const fixed = data.reply.replace(/([a-z])([A-Z])/g, "$1 $2");

  stream(aiDiv, fixed);

  chats[currentChat].messages.push({ role: "ai", text: fixed });

  if (chats[currentChat].title === "New Chat") {
    chats[currentChat].title = msg.split(" ").slice(0,5).join(" ");
    renderSidebar();
  }

  save();
}

/* ENTER SEND */
input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

init();
</script></body>
</html>
